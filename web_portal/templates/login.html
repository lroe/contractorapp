<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Material HQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">⬡</div>
      <h1>Material<strong>HQ</strong></h1>
      <p>Contractor Materials Portal</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}" style="margin-bottom:16px">
          <span>{{ message }}</span>
          <button onclick="this.parentElement.remove()">×</button>
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="Enter phone number" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary login-submit">Sign In</button>
    </form>

    <p style="margin-top:20px;text-align:center;font-size:12px;color:#94A3B8">
      Material Manager: 7777777777 / pass123<br>
      Owner: 9999999999 / pass123
    </p>
  </div>
</div>
</body>
</html>
