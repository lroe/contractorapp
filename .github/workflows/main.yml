name: Build iOS (Flutter)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS
        # Using 'ios' instead of 'ipa' is more reliable for non-codesigned builds
        run: flutter build ios --release --no-codesign --verbose

      - name: 🔍 Debug Directory Structure
        run: |
          echo "=== Root Contents ==="
          ls -R build/ios/iphoneos

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Nirmitha-iOS-Build
          # We use the relative path from the repo root
          # This targets the .app bundle generated by the build
          path: mobile_app/build/ios/iphoneos/*.app
          retention-days: 7
          if-no-files-found: error
