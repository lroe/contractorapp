name: Build iOS (Flutter)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: mobile_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          cd ios && pod install

      - name: Build IPA
        run: flutter build ipa --release --no-codesign --verbose

      - name: 🔍 Debug Build Output
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Looking for .ipa files ==="
          find . -name "*.ipa" -type f

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Nirmitha-iOS-IPA
          path: mobile_app/build/ios/ipa/*.ipa
          retention-days: 7
